<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Bristol Myers Squibb work placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <radialGradient id="blob1" cx="25%" cy="25%" r="60%">
      <stop offset="0" stop-color="#fb7185" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="78%" cy="68%" r="65%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#blob1)"/>
  <rect width="1600" height="1000" fill="url(#blob2)"/>

  <g transform="translate(130 130)" filter="url(#shadow)">
    <rect width="1340" height="740" rx="22" fill="#ffffff" stroke="#e5e7eb"/>

    <g transform="translate(40 38)">
      <rect x="0" y="0" width="520" height="56" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
      <image href="/logos/BMS.jpeg" x="14" y="12" width="32" height="32" preserveAspectRatio="xMidYMid meet"/>
      <rect x="60" y="16" width="280" height="10" rx="5" fill="#cbd5e1"/>
      <rect x="60" y="32" width="170" height="8" rx="4" fill="#e5e7eb"/>
      <rect x="420" y="18" width="86" height="24" rx="12" fill="url(#accent)" opacity="0.14"/>
    </g>

    <rect x="40" y="140" width="610" height="560" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="70" y="170" width="340" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="70" y="196" width="240" height="14" rx="7" fill="#e5e7eb"/>

    <g opacity="0.9">
      <rect x="70" y="250" width="550" height="120" rx="16" fill="#f8fafc" stroke="#e5e7eb"/>
      <rect x="95" y="278" width="260" height="14" rx="7" fill="#e5e7eb"/>
      <rect x="95" y="304" width="420" height="14" rx="7" fill="#e5e7eb"/>

      <rect x="70" y="390" width="550" height="120" rx="16" fill="#f8fafc" stroke="#e5e7eb"/>
      <rect x="95" y="418" width="300" height="14" rx="7" fill="#e5e7eb"/>
      <rect x="95" y="444" width="380" height="14" rx="7" fill="#e5e7eb"/>

      <rect x="70" y="530" width="550" height="120" rx="16" fill="#f8fafc" stroke="#e5e7eb"/>
      <rect x="95" y="558" width="280" height="14" rx="7" fill="#e5e7eb"/>
      <rect x="95" y="584" width="400" height="14" rx="7" fill="#e5e7eb"/>
    </g>

    <rect x="690" y="140" width="610" height="560" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
    <circle cx="770" cy="260" r="60" fill="url(#accent)" opacity="0.35"/>
    <circle cx="980" cy="340" r="90" fill="url(#accent)" opacity="0.25"/>
    <circle cx="1160" cy="250" r="50" fill="url(#accent)" opacity="0.30"/>
    <path d="M760 520 C 880 420, 1000 420, 1120 520" fill="none" stroke="url(#accent)" stroke-width="10" opacity="0.6"/>
    <path d="M730 560 C 900 430, 1020 430, 1190 560" fill="none" stroke="url(#accent)" stroke-width="10" opacity="0.35"/>

    <rect x="40" y="740" width="1260" height="8" rx="4" fill="url(#accent)" opacity="0.9"/>
  </g>
</svg>
