<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Charles Schwab work placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <radialGradient id="blob1" cx="30%" cy="20%" r="60%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="80%" cy="70%" r="65%">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#blob1)"/>
  <rect width="1600" height="1000" fill="url(#blob2)"/>

  <g transform="translate(130 130)" filter="url(#shadow)">
    <rect width="1340" height="740" rx="22" fill="#ffffff" stroke="#e5e7eb"/>

    <g transform="translate(40 38)">
      <rect x="0" y="0" width="420" height="56" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
      <image href="/logos/charles-schwab.png" x="14" y="12" width="32" height="32" preserveAspectRatio="xMidYMid meet"/>
      <rect x="60" y="16" width="220" height="10" rx="5" fill="#cbd5e1"/>
      <rect x="60" y="32" width="140" height="8" rx="4" fill="#e5e7eb"/>
      <rect x="330" y="18" width="72" height="24" rx="12" fill="url(#accent)" opacity="0.14"/>
    </g>

    <rect x="40" y="140" width="880" height="360" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
    <rect x="60" y="170" width="520" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="60" y="196" width="420" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="60" y="222" width="640" height="14" rx="7" fill="#e5e7eb"/>

    <rect x="960" y="140" width="340" height="560" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="990" y="170" width="280" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="990" y="196" width="200" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="990" y="250" width="280" height="120" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
    <rect x="990" y="390" width="280" height="120" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
    <rect x="990" y="530" width="280" height="120" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>

    <rect x="40" y="540" width="880" height="160" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="60" y="570" width="220" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="60" y="596" width="720" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="60" y="622" width="620" height="14" rx="7" fill="#e5e7eb"/>

    <rect x="40" y="740" width="1260" height="8" rx="4" fill="url(#accent)" opacity="0.9"/>
  </g>
</svg>
